<!DOCTYPE html>
<html>
<head>

<title>Find Ride</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="ride-form">

<div class="ride-tabs">

<a class="active-tab">Find Ride</a>

<a href="/create_ride">Offer Ride</a>

</div>

<form>

<label>Start Location</label>

<input
type="text"
placeholder="Sector 4 Office Tower">

<label>Destination</label>

<input
type="text"
placeholder="Downtown Commuter Hub">

<div class="two-fields">

<div>

<label>Date & Time</label>

<input type="datetime-local">

</div>

<div>

<label>Seat Requirement</label>

<input
type="number"
placeholder="1">

</div>

</div>

<label>

<input type="checkbox">

Recurring Ride

</label>

<button>

Find Ride

</button>

</form>

</div>

</body>

</html>
