<!DOCTYPE html>
<html>
<head>
    <title>Create Ride</title>
</head>
<body>

<h2>Create Ride</h2>

<form method="POST">

    <input type="text" name="pickup" placeholder="Pickup Location" required><br><br>

    <input type="text" name="destination" placeholder="Destination" required><br><br>

    <input type="date" name="date" required><br><br>

    <input type="time" name="time" required><br><br>

    <input type="number" name="seats" placeholder="Available Seats" required><br><br>

    <input type="text" name="vehicle" placeholder="Vehicle Name" required><br><br>

    <input type="number" name="price" placeholder="Price Per Seat" required><br><br>

    <button type="submit">Create Ride</button>

</form>

</body>
</html>
