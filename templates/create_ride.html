<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteMate - Offer Ride</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="navbar">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-car-tunnel"></i>
            </div>
            <div class="logo-text">
                <h2>RouteMate</h2>
                <span>Smart Carpooling Platform</span>
            </div>
        </div>

        <nav class="dashboard-navbar">
            <a href="/create_ride" class="active-tab"><i class="fas fa-plus"></i> Offer Ride</a>
            <a href="/find_ride"><i class="fas fa-magnifying-glass"></i> Find Ride</a>
            <a href="/commute_buddy"><i class="fas fa-user-group"></i> Commute Buddy</a>
            <a href="/ride_history"><i class="fas fa-history"></i> Ride History</a>
            <a href="/wallet"><i class="fas fa-wallet"></i> Wallet</a>
            <a href="/sos" style="color: var(--danger);"><i class="fas fa-circle-exclamation"></i> Emergency SOS</a>
        </nav>

        <a href="/logout" class="logout-btn">
            <i class="fas fa-right-from-bracket"></i> Logout
        </a>
    </header>

    <div class="ride-form-container">
        <div class="ride-form glass-panel">
            <div class="ride-tabs">
                <a href="/find_ride">Find Ride</a>
                <a class="active-tab">Offer Ride</a>
            </div>

            <form action="/create_ride" method="POST">
                <div class="form-group">
                    <label for="pickup">Start Location</label>
                    <div class="input-container">
                        <i class="fas fa-circle-dot" style="color: var(--accent);"></i>
                        <input 
                            type="text" 
                            id="pickup"
                            name="pickup" 
                            placeholder="e.g. Sector 4 Office Tower"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="destination">Destination</label>
                    <div class="input-container">
                        <i class="fas fa-location-dot" style="color: var(--danger);"></i>
                        <input 
                            type="text" 
                            id="destination"
                            name="destination" 
                            placeholder="e.g. Downtown Commuter Hub"
                            required>
                    </div>
                </div>

                <div class="two-fields">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <div class="input-container">
                            <i class="fas fa-calendar-days"></i>
                            <input 
                                type="date" 
                                id="date"
                                name="date" 
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="time">Departure Time</label>
                        <div class="input-container">
                            <i class="fas fa-clock"></i>
                            <input 
                                type="time" 
                                id="time"
                                name="time" 
                                required>
                        </div>
                    </div>
                </div>

                <div class="two-fields">
                    <div class="form-group">
                        <label for="seats">Available Seats</label>
                        <div class="input-container">
                            <i class="fas fa-chair"></i>
                            <input 
                                type="number" 
                                id="seats"
                                name="seats" 
                                min="1"
                                max="8"
                                placeholder="3"
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="price">Fare per Seat (₹)</label>
                        <div class="input-container">
                            <i class="fas fa-indian-rupee-sign"></i>
                            <input 
                                type="number" 
                                id="price"
                                name="price" 
                                min="0"
                                placeholder="150"
                                required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="vehicle">Vehicle Information</label>
                    <div class="input-container">
                        <i class="fas fa-car-side"></i>
                        <input 
                            type="text" 
                            id="vehicle"
                            name="vehicle" 
                            placeholder="e.g. White Honda City (KA-01-XX-1234)"
                            required>
                    </div>
                </div>

                <button type="submit">
                    <i class="fas fa-paper-plane"></i> Publish Commute Offer
                </button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 RouteMate Corporate Carpooling. All Rights Reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
